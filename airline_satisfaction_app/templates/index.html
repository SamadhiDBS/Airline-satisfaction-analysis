<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Airline Satisfaction Predictor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px;
            text-align: center;
        }

        .header h1 {
            font-size: 36px;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 18px;
            opacity: 0.95;
        }

        .content {
            padding: 40px;
        }

        .section {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 30px;
            border: 1px solid #e9ecef;
        }

        .section h2 {
            color: #495057;
            margin-bottom: 25px;
            font-size: 24px;
            border-bottom: 3px solid #667eea;
            padding-bottom: 10px;
            display: inline-block;
        }

        .form-group {
            margin-bottom: 20px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
        }

        .form-group label {
            flex: 0 0 200px;
            font-weight: 600;
            color: #495057;
        }

        .form-group input,
        .form-group select {
            flex: 1;
            padding: 12px 15px;
            border: 2px solid #dee2e6;
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.3s;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .rating-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .rating-item {
            background: white;
            padding: 15px;
            border-radius: 10px;
            border: 1px solid #e9ecef;
        }

        .rating-item label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #495057;
        }

        .rating-item select {
            width: 120px;
            padding: 8px 12px;
            border: 2px solid #dee2e6;
            border-radius: 6px;
            font-size: 15px;
        }

        .required {
            color: #dc3545;
            margin-left: 3px;
        }

        .btn-submit {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 18px 45px;
            font-size: 20px;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            display: block;
            margin: 30px auto 0;
            transition: all 0.3s;
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(102, 126, 234, 0.4);
        }

        .accuracy-badge {
            text-align: center;
            margin-top: 30px;
            padding: 15px;
            background: #e3f2fd;
            border-radius: 50px;
            color: #0d47a1;
            font-weight: 500;
        }

        .note {
            font-size: 14px;
            color: #6c757d;
            margin-top: 5px;
            font-style: italic;
        }

        @media (max-width: 768px) {
            .form-group {
                flex-direction: column;
                align-items: flex-start;
            }
            
            .form-group label {
                margin-bottom: 8px;
            }
            
            .form-group input,
            .form-group select {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>✈️ Airline Customer Satisfaction Predictor</h1>
            <p>Predict passenger satisfaction using Machine Learning</p>
        </div>
        
        <div class="content">
            <form action="/predict" method="post">
                <!-- Passenger Information Section -->
                <div class="section">
                    <h2>📋 Passenger Information</h2>
                    
                    <div class="form-group">
                        <label>Gender <span class="required">*</span></label>
                        <select name="gender" required>
                            <option value="" disabled selected>-- Select Gender --</option>
                            <option value="Female">Female</option>
                            <option value="Male">Male</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label>Customer Type <span class="required">*</span></label>
                        <select name="customer_type" required>
                            <option value="" disabled selected>-- Select Customer Type --</option>
                            <option value="Loyal Customer">Loyal Customer</option>
                            <option value="disloyal Customer">Disloyal Customer</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label>Age <span class="required">*</span></label>
                        <input type="number" name="age" min="1" max="100" placeholder="Enter age" required>
                    </div>
                    
                    <div class="form-group">
                        <label>Type of Travel <span class="required">*</span></label>
                        <select name="type_of_travel" required>
                            <option value="" disabled selected>-- Select Travel Type --</option>
                            <option value="Business travel">Business Travel</option>
                            <option value="Personal Travel">Personal Travel</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label>Class <span class="required">*</span></label>
                        <select name="class" required>
                            <option value="" disabled selected>-- Select Class --</option>
                            <option value="Business">Business</option>
                            <option value="Eco">Economy</option>
                            <option value="Eco Plus">Economy Plus</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label>Flight Distance (miles) <span class="required">*</span></label>
                        <input type="number" name="flight_distance" min="0" placeholder="Enter flight distance" required>
                    </div>
                </div>
                
                <!-- Service Ratings Section -->
                <div class="section">
                    <h2>⭐ Service Ratings</h2>
                    <p class="note">Rate each service from 1 (worst) to 5 (best)</p>
                    
                    <div class="rating-grid">
                        <div class="rating-item">
                            <label>Inflight WiFi</label>
                            <select name="inflight_wifi_service" required>
                                <option value="" disabled selected>Select</option>
                                <option value="1">1 - Poor</option>
                                <option value="2">2 - Fair</option>
                                <option value="3">3 - Good</option>
                                <option value="4">4 - Very Good</option>
                                <option value="5">5 - Excellent</option>
                            </select>
                        </div>
                        
                        <div class="rating-item">
                            <label>Departure/Arrival Time</label>
                            <select name="departure_arrival_time_convenient" required>
                                <option value="" disabled selected>Select</option>
                                <option value="1">1 - Poor</option>
                                <option value="2">2 - Fair</option>
                                <option value="3">3 - Good</option>
                                <option value="4">4 - Very Good</option>
                                <option value="5">5 - Excellent</option>
                            </select>
                        </div>
                        
                        <div class="rating-item">
                            <label>Ease of Online Booking</label>
                            <select name="ease_of_online_booking" required>
                                <option value="" disabled selected>Select</option>
                                <option value="1">1 - Poor</option>
                                <option value="2">2 - Fair</option>
                                <option value="3">3 - Good</option>
                                <option value="4">4 - Very Good</option>
                                <option value="5">5 - Excellent</option>
                            </select>
                        </div>
                        
                        <div class="rating-item">
                            <label>Gate Location</label>
                            <select name="gate_location" required>
                                <option value="" disabled selected>Select</option>
                                <option value="1">1 - Poor</option>
                                <option value="2">2 - Fair</option>
                                <option value="3">3 - Good</option>
                                <option value="4">4 - Very Good</option>
                                <option value="5">5 - Excellent</option>
                            </select>
                        </div>
                        
                        <div class="rating-item">
                            <label>Food and Drink</label>
                            <select name="food_and_drink" required>
                                <option value="" disabled selected>Select</option>
                                <option value="1">1 - Poor</option>
                                <option value="2">2 - Fair</option>
                                <option value="3">3 - Good</option>
                                <option value="4">4 - Very Good</option>
                                <option value="5">5 - Excellent</option>
                            </select>
                        </div>
                        
                        <div class="rating-item">
                            <label>Online Boarding</label>
                            <select name="online_boarding" required>
                                <option value="" disabled selected>Select</option>
                                <option value="1">1 - Poor</option>
                                <option value="2">2 - Fair</option>
                                <option value="3">3 - Good</option>
                                <option value="4">4 - Very Good</option>
                                <option value="5">5 - Excellent</option>
                            </select>
                        </div>
                        
                        <div class="rating-item">
                            <label>Seat Comfort</label>
                            <select name="seat_comfort" required>
                                <option value="" disabled selected>Select</option>
                                <option value="1">1 - Poor</option>
                                <option value="2">2 - Fair</option>
                                <option value="3">3 - Good</option>
                                <option value="4">4 - Very Good</option>
                                <option value="5">5 - Excellent</option>
                            </select>
                        </div>
                        
                        <div class="rating-item">
                            <label>Inflight Entertainment</label>
                            <select name="inflight_entertainment" required>
                                <option value="" disabled selected>Select</option>
                                <option value="1">1 - Poor</option>
                                <option value="2">2 - Fair</option>
                                <option value="3">3 - Good</option>
                                <option value="4">4 - Very Good</option>
                                <option value="5">5 - Excellent</option>
                            </select>
                        </div>
                        
                        <div class="rating-item">
                            <label>On-board Service</label>
                            <select name="on_board_service" required>
                                <option value="" disabled selected>Select</option>
                                <option value="1">1 - Poor</option>
                                <option value="2">2 - Fair</option>
                                <option value="3">3 - Good</option>
                                <option value="4">4 - Very Good</option>
                                <option value="5">5 - Excellent</option>
                            </select>
                        </div>
                        
                        <div class="rating-item">
                            <label>Leg Room Service</label>
                            <select name="leg_room_service" required>
                                <option value="" disabled selected>Select</option>
                                <option value="1">1 - Poor</option>
                                <option value="2">2 - Fair</option>
                                <option value="3">3 - Good</option>
                                <option value="4">4 - Very Good</option>
                                <option value="5">5 - Excellent</option>
                            </select>
                        </div>
                        
                        <div class="rating-item">
                            <label>Baggage Handling</label>
                            <select name="baggage_handling" required>
                                <option value="" disabled selected>Select</option>
                                <option value="1">1 - Poor</option>
                                <option value="2">2 - Fair</option>
                                <option value="3">3 - Good</option>
                                <option value="4">4 - Very Good</option>
                                <option value="5">5 - Excellent</option>
                            </select>
                        </div>
                        
                        <div class="rating-item">
                            <label>Check-in Service</label>
                            <select name="checkin_service" required>
                                <option value="" disabled selected>Select</option>
                                <option value="1">1 - Poor</option>
                                <option value="2">2 - Fair</option>
                                <option value="3">3 - Good</option>
                                <option value="4">4 - Very Good</option>
                                <option value="5">5 - Excellent</option>
                            </select>
                        </div>
                        
                        <div class="rating-item">
                            <label>Inflight Service</label>
                            <select name="inflight_service" required>
                                <option value="" disabled selected>Select</option>
                                <option value="1">1 - Poor</option>
                                <option value="2">2 - Fair</option>
                                <option value="3">3 - Good</option>
                                <option value="4">4 - Very Good</option>
                                <option value="5">5 - Excellent</option>
                            </select>
                        </div>
                        
                        <div class="rating-item">
                            <label>Cleanliness</label>
                            <select name="cleanliness" required>
                                <option value="" disabled selected>Select</option>
                                <option value="1">1 - Poor</option>
                                <option value="2">2 - Fair</option>
                                <option value="3">3 - Good</option>
                                <option value="4">4 - Very Good</option>
                                <option value="5">5 - Excellent</option>
                            </select>
                        </div>
                    </div>
                </div>
                
                <!-- Delay Information Section -->
                <div class="section">
                    <h2>⏰ Delay Information</h2>
                    
                    <div class="form-group">
                        <label>Departure Delay (minutes)</label>
                        <input type="number" name="departure_delay_in_minutes" min="0" value="0" placeholder="Enter delay in minutes" required>
                    </div>
                    
                    <div class="form-group">
                        <label>Arrival Delay (minutes)</label>
                        <input type="number" name="arrival_delay_in_minutes" min="0" value="0" placeholder="Enter delay in minutes" required>
                    </div>
                </div>
                
                <button type="submit" class="btn-submit">🔮 Predict Satisfaction</button>
                
                <div class="accuracy-badge">
                    ✨ Model Accuracy: {{ "%.1f"|format(best_accuracy * 100) if best_accuracy else 95.0 }}%
                </div>
            </form>
        </div>
    </div>
</body>
</html>
